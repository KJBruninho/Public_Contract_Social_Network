{% extends "base.html" %}
{% block title %}Login · EU-PAGOTAMANHÃ{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-copy card"><span class="eyebrow">Welcome back</span><h1>Access your secure contract workspace.</h1><p>Sign, settle and verify digital contracts.</p></div>
  <form class="form-card card" method="post">
    {{ csrf_field() }}
    <h2>Login</h2>
    <label>Email<input type="email" name="email" required></label>
    <label>Password<input type="password" name="password" required></label>
    <button class="btn btn-primary full" type="submit">Sign in</button>
    <p class="muted center">No account? <a href="{{ url_for('register') }}">Create one</a></p>
  </form>
</section>
{% endblock %}
